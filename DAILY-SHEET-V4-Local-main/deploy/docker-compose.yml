version: "3.9"

# Daily Sheet — Local Development Stack
# Runs Postgres in a container; the Node app runs natively (npm run dev).
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
#   docker compose -f deploy/docker-compose.yml down
#   docker compose -f deploy/docker-compose.yml down -v   # also wipes DB data

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dailysheet
      POSTGRES_PASSWORD: dailysheet
      POSTGRES_DB: dailysheet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailysheet -d dailysheet"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    driver: local
